<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="512" height="512" viewBox="0 0 512 512" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <title>Szyszka</title>
  <!-- Palette: single warm-brown ramp, dark -> light (all related / 相近) -->
  <!-- #40230f stem shadow (darkest) | #5c371e stem & gradient center -->
  <!-- #7c5738 gradient edge | #9b7853 thickness -->
  <!-- #bc996e checker row1 | #d3b386 checker row2 | #e4c79c checker row3 -->
  <!-- #f1d9ac base (lightest) -->
  <defs>
    <radialGradient id="stemRadial" cx="256" cy="94" r="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5c371eff"/>
      <stop offset="1" stop-color="#7c5738ff"/>
    </radialGradient>
    <clipPath id="cone">
      <path d="M 148.80 347.90 A 150.00 150.00 0 1 1 363.20 347.90 L 261.70 451.60 A 8.00 8.00 0 0 1 250.30 451.60 L 148.80 347.90 Z"/>
    </clipPath>
  </defs>

  <!-- Thickness: stacked offset copies of the silhouette, alternating solid/gradient -->
  <path d="M 148.80 347.90 A 150.00 150.00 0 1 1 363.20 347.90 L 261.70 451.60 A 8.00 8.00 0 0 1 250.30 451.60 L 148.80 347.90 Z" fill="#9b7853ff" transform="translate(0,16)"/>

  <!-- Pinecone front face: full circle blended (tangent) into a pointed base with a rounded tip -->
  <g clip-path="url(#cone)">
    <!-- upper region: solid deeper color (split at 1/3 of circle, y=193) -->
    <rect x="106" y="80" width="300" height="113" fill="url(#stemRadial)"/>
    <!-- lower region: lighter base -->
    <rect x="106" y="193" width="300" height="290" fill="#f1d9ac"/>
    <!-- checkerboard dark squares (enlarged 100x100) -->
    <rect x="206" y="193" width="100" height="100" fill="#bc996eff"/>
    <rect x="106" y="293" width="100" height="100" fill="#d3b386ff"/>
    <rect x="306" y="293" width="100" height="100" fill="#d3b386ff"/>
    <rect x="206" y="393" width="100" height="100" fill="#e4c79cff"/>
  </g>

  <!-- Stem shadow: solid offset (kept round) -->
  <circle cx="256" cy="105" r="48" fill="#40230fff"/>

  <!-- Stem: circle (kept round) -->
  <circle cx="256" cy="94" r="48" fill="#5c371eff"/>
</svg>
