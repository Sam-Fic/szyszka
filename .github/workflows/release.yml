name: 🚀 Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  flatpak:
    name: 📦 Flatpak Bundle
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged
    env:
      CARGO_HOME: /root/.cargo
      RUSTUP_HOME: /root/.rustup

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.96.1 --no-modify-path
          echo "/root/.cargo/bin" >> "$GITHUB_PATH"
          /root/.cargo/bin/rustc --version

      - name: Vendor Cargo dependencies
        run: cargo vendor

      - name: Build Flatpak
        run: |
          flatpak-builder --repo=repo build-dir flatpak/com.github.samfic.szyszka.yml --force-clean

      - name: Export Flatpak bundle
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          flatpak build-bundle repo szyszka-${VERSION}.flatpak com.github.samfic.szyszka
          ls -lh szyszka-*.flatpak

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: szyszka-${{ steps.version.outputs.VERSION }}-flatpak
          path: szyszka-*.flatpak

  windows:
    name: 🏁 Windows Binary
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install GTK dependencies and Rust (MSYS2)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-rust
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libadwaita
            mingw-w64-x86_64-pkgconf

      - name: Build Release
        shell: msys2 {0}
        run: |
          cargo build --release
          cp target/release/szyszka.exe windows_szyszka.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: szyszka-windows
          path: windows_szyszka.exe

  macos:
    name: 🍎 macOS Binary
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          brew install gtk4 libadwaita pkg-config

      - name: Setup rust version
        run: rustup default 1.96.1

      - name: Build Release
        run: |
          cargo build --release
          mv target/release/szyszka mac_szyszka

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: szyszka-macos
          path: mac_szyszka

  release:
    name: 🚀 Publish to GitHub Release
    needs: [flatpak, windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Generate release notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('data/com.github.samfic.szyszka.metainfo.xml')
          root = tree.getroot()
          for release in root.findall('.//release'):
              if release.get('version') == '$VERSION':
                  desc = release.find('description')
                  if desc is not None:
                      parts = []
                      for p in desc.findall('.//p'):
                          if p.text:
                              parts.append(p.text.strip())
                      for li in desc.findall('.//li'):
                          if li.text:
                              parts.append('- ' + li.text.strip())
                      print('\n'.join(parts))
                  break
          " > /tmp/release-notes.md
          # Fallback if no notes found
          if [ ! -s /tmp/release-notes.md ]; then
            echo "Release v${VERSION}" > /tmp/release-notes.md
          fi
          cat /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
